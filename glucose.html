<!DOCTYPE html>
<!--
  혈당 항상성 시뮬레이션 — 시간에 따른 혈당 변화 그래프
  · 단일 .html · 외부 라이브러리 없음
  · 탐구: 먹고 움직여도 혈당이 일정하게 유지되는 이유는?
-->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>혈당 항상성 시뮬레이션</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:system-ui,"Malgun Gothic",sans-serif;background:#fff6f3;color:#46342f;
       min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:22px;}
  h1{font-size:1.45rem;color:#b5503a;margin-bottom:4px;text-align:center;}
  .q{color:#9c8178;font-size:.96rem;margin-bottom:16px;text-align:center;}
  .card{background:#fff;border:1px solid #f0d9d1;border-radius:16px;padding:16px;
        box-shadow:0 6px 18px rgba(180,120,100,.10);}
  canvas{display:block;}
  .controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:16px;}
  button{border:none;border-radius:12px;padding:12px 18px;font-size:1rem;font-weight:700;cursor:pointer;color:#fff;
         transition:transform .12s;}
  button:hover{transform:translateY(-2px);}
  .eat{background:#ff9aa2;} .exer{background:#6fb8d6;} .reset{background:#b9b1ac;}
  .readout{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:14px;}
  .stat{background:#fff;border:1px solid #f0d9d1;border-radius:12px;padding:10px 16px;text-align:center;min-width:120px;}
  .stat .lab{font-size:.72rem;color:#b59b92;}
  .stat .num{font-size:1.2rem;font-weight:700;color:#b5503a;font-variant-numeric:tabular-nums;}
  .hormone-tag{display:inline-block;padding:2px 10px;border-radius:8px;color:#fff;font-size:.85rem;font-weight:700;}
  .msg{margin-top:12px;background:#fffbe9;border:1px solid #f3e2a8;border-radius:10px;padding:12px 16px;
       font-size:.95rem;line-height:1.55;color:#6b5b1a;max-width:560px;text-align:center;min-height:3em;}
  footer{margin-top:16px;color:#bfa99f;font-size:.8rem;}
</style>
</head>
<body>
  <h1>🩸 혈당 항상성 시뮬레이션</h1>
  <p class="q">🤔 밥을 먹거나 운동을 해도 혈당이 일정하게 유지되는 건 어떻게 가능할까?</p>

  <div class="card">
    <canvas id="graph" width="560" height="280"></canvas>
  </div>

  <div class="controls">
    <button class="eat" id="eat">🍚 식사하기 (혈당 ↑)</button>
    <button class="exer" id="exer">🏃 운동하기 (혈당 ↓)</button>
    <button class="reset" id="reset">🔄 초기화</button>
  </div>

  <div class="readout">
    <div class="stat"><div class="lab">현재 혈당 (mg/dL)</div><div class="num" id="bsV">90</div></div>
    <div class="stat"><div class="lab">작용 호르몬</div><div class="num" id="hmV" style="font-size:1rem">균형 상태</div></div>
    <div class="stat"><div class="lab">간 글리코젠</div><div class="num" id="glV">🍬🍬</div></div>
  </div>
  <div class="msg" id="msg">버튼을 눌러 보세요. 정상 범위(70~110)를 벗어나면, 몸이 호르몬으로 스스로 되돌립니다.</div>
  <footer>탐구 아카이브 · GitHub Pages · 초록 띠 = 정상 범위</footer>

<script>
  var NORMAL_MIN = 70, NORMAL_MAX = 110, TARGET = 90;
  var BS_MIN = 40, BS_MAX = 200;
  var bs = 90;            // 현재 혈당
  var glycogen = 2;       // 0~5
  var series = [];       // 최근 혈당 값
  var MAXPTS = 140;

  var cv = document.getElementById('graph');
  var ctx = cv.getContext('2d');
  var bsV = document.getElementById('bsV');
  var hmV = document.getElementById('hmV');
  var glV = document.getElementById('glV');
  var msg = document.getElementById('msg');

  var padL = 46, padR = 14, padT = 14, padB = 26;
  function Y(v){ return (cv.height-padB) - (v-BS_MIN)/(BS_MAX-BS_MIN)*(cv.height-padT-padB); }

  function draw(){
    var W = cv.width, Hc = cv.height;
    ctx.clearRect(0,0,W,Hc);
    // 정상 범위 띠
    ctx.fillStyle = 'rgba(120,200,130,.22)';
    ctx.fillRect(padL, Y(NORMAL_MAX), W-padL-padR, Y(NORMAL_MIN)-Y(NORMAL_MAX));
    ctx.strokeStyle = 'rgba(90,180,100,.55)'; ctx.setLineDash([5,4]); ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(padL,Y(NORMAL_MAX)); ctx.lineTo(W-padR,Y(NORMAL_MAX)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(padL,Y(NORMAL_MIN)); ctx.lineTo(W-padR,Y(NORMAL_MIN)); ctx.stroke();
    ctx.setLineDash([]);
    // 축 + 눈금
    ctx.strokeStyle = '#e6cfc7'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(padL,padT); ctx.lineTo(padL,Hc-padB); ctx.lineTo(W-padR,Hc-padB); ctx.stroke();
    ctx.fillStyle = '#b59b92'; ctx.font='11px sans-serif'; ctx.textAlign='right';
    [40,70,110,150,200].forEach(function(v){ ctx.fillText(v.toString(), padL-6, Y(v)+4); });
    ctx.textAlign='left'; ctx.fillText('mg/dL', padL+4, padT+10);
    ctx.textAlign='right'; ctx.fillText('시간 →', W-padR, Hc-padB+18);
    // 혈당 곡선
    if(series.length>1){
      ctx.strokeStyle = '#e0593f'; ctx.lineWidth=2.5; ctx.beginPath();
      for(var i=0;i<series.length;i++){
        var x = padL + (i/(MAXPTS-1))*(W-padL-padR);
        var y = Y(series[i]);
        if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      ctx.stroke();
      // 현재 점
      var lx = padL + ((series.length-1)/(MAXPTS-1))*(W-padL-padR);
      ctx.fillStyle='#b5503a'; ctx.beginPath(); ctx.arc(lx, Y(series[series.length-1]), 4,0,Math.PI*2); ctx.fill();
    }
  }

  function setHormone(name, color){
    hmV.innerHTML = '<span class="hormone-tag" style="background:'+color+'">'+name+'</span>';
  }

  function tick(){
    // 항상성 조절
    var hormone, color, m;
    if(bs > NORMAL_MAX){
      hormone='인슐린'; color='#6fb8d6';
      bs -= 0.10*(bs-TARGET) + 0.6;        // 인슐린: 혈당 낮춤
      if(glycogen<5 && Math.random()<0.3) glycogen++;
      m='혈당이 높아 <b>인슐린</b> 분비 → 포도당을 세포로, 남는 건 간에 글리코젠으로 저장. 혈당이 내려갑니다.';
    } else if(bs < NORMAL_MIN){
      hormone='글루카곤'; color='#e6914e';
      bs += 0.10*(TARGET-bs) + 0.6;        // 글루카곤: 혈당 올림
      if(glycogen>0 && Math.random()<0.4) glycogen--;
      m='혈당이 낮아 <b>글루카곤</b> 분비 → 간의 글리코젠을 포도당으로 분해해 내보냅니다. 혈당이 올라갑니다.';
    } else {
      hormone='균형 상태'; color='#9bbf7a';
      bs += (TARGET-bs)*0.05;               // 정상 범위: 천천히 안정
      m='정상 범위(70~110)예요. 몸이 균형을 유지하고 있습니다.';
    }
    if(bs<BS_MIN) bs=BS_MIN; if(bs>BS_MAX) bs=BS_MAX;

    if(hormone==='균형 상태'){ hmV.textContent='균형 상태'; hmV.style.fontSize='1rem'; }
    else { setHormone(hormone,color); hmV.style.fontSize='1rem'; }
    bsV.textContent = Math.round(bs);
    glV.textContent = glycogen>0 ? '🍬'.repeat(glycogen) : '(비어있음)';

    // 메시지는 사건 직후에만 바꾸지 않고 상태 반영
    if(msg.dataset.lock !== '1') msg.innerHTML = m;

    series.push(bs);
    if(series.length>MAXPTS) series.shift();
    draw();
  }

  function flash(text){
    msg.innerHTML = text; msg.dataset.lock='1';
    setTimeout(function(){ msg.dataset.lock='0'; }, 1500);
  }

  document.getElementById('eat').addEventListener('click', function(){
    bs += 60; if(bs>BS_MAX) bs=BS_MAX;
    flash('🍚 식사로 혈당이 <b>급상승</b>했어요! 이자(췌장)가 곧 인슐린을 분비합니다.');
  });
  document.getElementById('exer').addEventListener('click', function(){
    bs -= 45; if(bs<BS_MIN) bs=BS_MIN;
    flash('🏃 운동으로 혈당이 <b>뚝 떨어졌어요</b>! 이자가 곧 글루카곤을 분비합니다.');
  });
  document.getElementById('reset').addEventListener('click', function(){
    bs=90; glycogen=2; series=[]; msg.dataset.lock='0';
    msg.innerHTML='초기 상태(90 mg/dL)로 돌아왔어요. 다시 실험해 볼까요?';
    for(var i=0;i<MAXPTS;i++) series.push(90);
    draw();
  });

  // 초기 채우기 + 시작
  for(var i=0;i<MAXPTS;i++) series.push(90);
  draw();
  setInterval(tick, 180);
</script>
</body>
</html>
